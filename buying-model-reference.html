"margin",label:"Margin Target",width:"150px"},{id:"mix",label:"% of Mix",width:"100px"},{id:"leadtime",label:"Lead Time",width:"130px"},{id:"cashflow",label:"Cash Flow Timing",width:"170px"},{id:"notes",label:"Things to Think About",width:"1fr"}],rows:[{id:"open-stock",color:"#c4502a",cells:{model:"01\nOpen Buying\n(In Stock)",rationale:"The default model. Product exists, is available now, and fits the range. Lowest risk, shortest lead time. Use for proven sellers, entry-price products, and filling gaps quickly. Best for building a reliable, consistent floor.",products:"Textiles & woven goods\nCeramics & homewares\nJewellery & accessories\nPrinted goods\nFood & packaged goods\nSmall fashion pieces",margin:"Fashion & apparel:\n2.5x–3.5x landed cost\n\nCraft & homewares:\n2.2x–3.0x landed cost\n\nJewellery:\n3.0x–4.0x landed cost",mix:"50–60%\nof buying budget",leadtime:"2–4 weeks\n(inc. shipping)",cashflow:"Money out: at order (full payment or deposit — many small makers request full upfront).\n\nMoney in: on sale.\n\nTightest cash gap of all models.",notes:"Always confirm in writing before any money moves, whatever the payment structure.\n\nFactor shipping, duties, and handling into landed cost — never calculate margin on maker price alone.\n\nMax 20 active maker relationships in Year 1. Depth over breadth."}},{id:"open-mto",color:"#7a4a2a",cells:{model:"02\nOpen Buying\n(Made to Order)",rationale:"Product exists in the maker's range but is made on request rather than held in stock. Slightly higher risk and longer lead time than in-stock, but still lower commitment than a commission. Good for products that need customisation (size, colour, quantity) or makers who don't warehouse.",products:"Woven & textile pieces\nCeramics (larger runs)\nLeatherwork\nCustom fashion\nCooperative goods\n(e.g. Mukamana)",margin:"Same targets as in-stock open buying.\n\nNote: factor pre-finance or full upfront payment cost into landed cost — this affects your real margin.",mix:"Part of the\n50–60%\nopen buying\nallocation",leadtime:"6–10 weeks\n(from order to delivery)",cashflow:"Money out: upfront or on order — full payment common with small makers.\n\nMoney in: on sale.\n\nLonger gap than in-stock. Plan buying calendar accordingly.",notes:"Place orders well ahead of floor refresh dates — 6–10 weeks disappears quickly.\n\nMany small makers will request full payment to initiate production. Normal — just document everything.\n\nConfirm maker's production capacity honestly before committing. Can they actually deliver at volume, on time?"}},{id:"commission",color:"#4a6741",cells:{model:"03\nCommissioned Production",rationale:"ICP works with a maker to produce something specific — usually a variation on something you've seen, or something developed from scratch via a brief and sampling process. Highest creative control, highest commitment. Use for hero pieces, exclusive range development, and deepening key maker relationships.",products:"Hero fashion pieces\nExclusive textiles\nLimited edition craft\nBespoke homewares\nSignature jewellery\n\n✗ Not suitable for: food, perishables, or high-volume basics",margin:"Same category targets apply.\n\nLanded cost here includes: sample cost (ICP absorbs) + production payment + shipping + duties.\n\nDon't skip the margin calc because you love the piece.",mix:"20–25%\nof buying budget\n\n+10–15%\nfor sampling",leadtime:"10–16 weeks\n(inc. sampling & revision)",cashflow:"Money out in stages: sampling cost first, then production payment (deposit or full — discuss with maker).\n\nMoney in: on sale.\n\nLongest cash gap. Highest upfront commitment. Only use when the relationship and the brief are solid.",notes:"ICP always absorbs sampling cost — never ask a maker to fund a sample for your brief.\n\nExclusivity/IP: a live question, not a given. Raise it at brief stage. Are you the only stockist? Is this design exclusive to ICP? Document whatever's agreed — don't assume.\n\nNever go into production without an approved sample on file.\n\nPay on time. Reputation in a small creative community travels fast."}},{id:"consignment",color:"#3d4f5c",cells:{model:"04\nConsignment",rationale:"High-value or notable pieces placed in store without upfront cost to ICP. If it sells, ICP takes 20% commission. If it doesn't, it's returned. Use for artworks, sculpture, significant objects by known makers — pieces that raise the visual standard and signal what InZero stands for, even if they sell slowly.",products:"Artworks & prints\nSculpture & objects\nHigh-value textiles\nSignature pieces\nInstallation works\n\n✗ Not for: everyday stock, food, or anything that needs frequent replenishment",margin:"20% commission on agreed retail price.\n\nNo landed cost — ICP doesn't buy the stock.\n\nInsurance while in store and return logistics are ICP's cost. Factor this in.",mix:"0% of buying budget\n(no upfront cost)\n\nBut budget for insurance + return logistics",leadtime:"4 weeks\n(logistics + installation)",cashflow:"Money out: only if piece sells (return logistics) or doesn't sell (return logistics + insurance).\n\nMoney in: 20% of retail price, on sale only.\n\nBest cash flow of all models — but lowest and least predictable revenue.",notes:"Minimum consignment period: 3 months. Don't markdown without speaking to the maker first.\n\nInbound logistics: maker's responsibility. Return: ICP's responsibility.\n\nInsurance while in store: ICP's responsibility — check policy covers third-party goods.\n\nConsignment pieces are also an educational tool. Quality here raises the standard for everything else in the space."}}]};function p(){var e=s((0,r.useState)(d),2),n=e[0],t=e[1],l=s((0,r.useState)(!1),2),a=l[0],o=l[1],c=s((0,r.useState)(null),2),p=c[0],m=c[1],h=function(e,n,r){t(function(t){return i(i({},t),{},{rows:t.rows.map(function(t){return t.id===e?i(i({},t),{},{cells:i(i({},t.cells),{},u({},n,r))}):t})})})},g=n.columns.map(function(e){return e.width}).join(" ");return r.createElement("div",{style:{fontFamily:
