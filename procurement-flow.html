ment","Receive & QC","Sell & Review"],rows:[{id:"buyer",actor:"Buyer / ICP",steps:[{id:"os-b1",title:"Research & Shortlist",body:"Scout via Instagram (search by material, technique, location), market visits, Inzira network, open calls, and referrals from existing makers.",note:"Log: photo + maker name + why it fits + model type. Follow up within 2 weeks.",type:"action"},{id:"os-b2",title:"Initial Outreach",body:"Introduce ICP/InZero via DM (IG or WhatsApp). State who you are and what you're building. Do not lead with a price ask. Move to email for anything substantive.",guardrail:"Lead with the story, not the order. A cold commercial ask reads as disrespectful in a small creative community.",type:"action"},{id:"os-b3",title:"Curation Review",body:"Does it fit InZero's editorial POV? Can it hit target margin for its category? Is maker capacity confirmed?",type:"decision",branches:["Fits + in stock → proceed","Love it but not in stock → Made to Order tab","Not yet → feedback loop"]},{id:"os-b4",title:"Confirm Order & Terms",body:"Agree quantity, price, payment terms, delivery timeline, and recourse if goods don't arrive as specified. Confirm in-stock availability and delivery window.",note:"Payment terms vary — many small brands will ask for full payment upfront rather than a deposit. This is normal. Agree terms clearly in writing before any money moves, whatever the structure.",type:"action"},{id:"os-b5",title:"QC Inspection",body:"Check against order: material, finish, quantity (±10% tolerance), delivery timing. Accept, renegotiate, or reject. Document decision in writing either way.",type:"action"},{id:"os-b6",title:"Sell-Through Review",body:"8 wks: move to featured/sale zone. 12 wks: markdown up to 30%. 16 wks: return to maker or archive sale. Discuss with maker before any markdown — keep the relationship. Active decision at each stage, not passive hope.",type:"decision",branches:["Selling → rebuy","Not selling → feedback & review"]}]},{id:"maker",actor:"Maker / Creator",steps:[{id:"os-m1",title:"Receives Introduction",body:"Reviews outreach. Responds with interest or declines.",type:"action"},{id:"os-m2",title:"Sends Line Sheet / Portfolio",body:"Shares catalogue, portfolio images, pricing, available stock, and MOQ info.",type:"action"},{id:"os-m3",title:"Capacity Confirmed",body:"Buyer confirms maker can produce or supply consistently at required volume. A beautiful one-off ≠ a reliable supply partner.",type:"action"},{id:"os-m4",title:"Confirms Stock & Dispatches",body:"Confirms availability and delivery date. Ships goods to ICP. Inbound logistics typically maker's responsibility.",type:"action"},{id:"os-m5",title:"Story Content Provided",body:"Maker provides bio (2–3 sentences), piece or collection story, 3+ process photos, preferred credit name.",note:"Ideal for brand/maker to send this through directly. ICP may need to source it — flag early so it doesn't delay the maker card going live in store.",type:"action"},{id:"os-m6",title:"Sales Feedback Received",body:"ICP shares what sold and what didn't. Makers who know what's working make better work. Foundation for the rebuy conversation.",type:"action"}]},{id:"admin",actor:"Admin / Ops",steps:[{id:"os-a1",title:"Log to Maker Pipeline",body:"Tracker updated: maker name, source channel, category, date contacted, follow-up date.",type:"action"},{id:"os-a2",title:"Acknowledge Inbound",body:"Any unsolicited inbound acknowledged within 5 working days. Standard response with clear next steps and expected timeline.",type:"action"},{id:"os-a3",title:"Feedback Loop",body:"If not proceeding now: send a warm, specific response — what would make this a fit for us? What are we looking for? Keep the door open. This is relationship-building, not rejection.",type:"action"},{id:"os-a4",title:"Issue PO & Process Payment",body:"PO raised using Open Buying Contract Template. Payment processed per agreed terms. All deposit terms documented before any money moves.",type:"action"},{id:"os-a5",title:"Stock Intake & Maker Card",body:"Stock received, counted, reconciled against PO. Entered into inventory system. Maker card created and placed in store. Reorder trigger set.",type:"action"},{id:"os-a6",title:"Reorder Trigger / Archive",body:"System flags reorder when stock hits threshold. Buyer notified. Or product archived with sell-through notes for future buying decisions.",type:"action"}]}]},{id:"open-mto",label:"02 — Made to Order",sublabel:"Product exists but is made on request · 6–10 week lead time · part of open buying budget",color:"#7a4a2a",phases:["Discovery","Outreach","Curation Gate","Order & Pre-Finance","Receive & QC","Sell & Review"],rows:[{id:"buyer",actor:"Buyer / ICP",steps:[{id:"mto-b1",title:"Research & Shortlist",body:"Same sourcing channels as in-stock open buying. Identify that the product is made-to-order (not held in stock) during initial outreach or line sheet review.",note:"Log: photo + maker name + why it fits + confirm made-to-order status. Follow up within 2 weeks.",type:"action"},{id:"mto-b2",title:"Initial Outreach",body:"Introduce ICP/InZero via DM (IG or WhatsApp). Confirm made-to-order mechanics: what's the lead time, minimum quantity, and deposit requirement?",guardrail:"Lead with the story, not the order. Confirm MTO terms before raising expectations on either side.",type:"action"},{id:"mto-b3",title:"Curation Review",body:"Does it fit InZero's editorial POV? Can it hit target margin including the longer lead time and any deposit financing cost? Is maker production capacity confirmed?",type:"decision",branches:["Fits → proceed","Not yet → feedback loop"]},{id:"mto-b4",title:"Place Order & Pre-Finance",body:"Agree quantity, spec, price, payment terms, delivery date, and recourse if goods don't arrive as specified.",note:"Many small makers will request full payment upfront rather than a deposit — this is common and not a red flag. Agree terms clearly in writing before any money moves, whatever the structure. Factor any pre-finance cost into your landed cost margin calc.",type:"action"},{id:"mto-b5",title:"QC Inspection",body:"Check against order: material, finish, quantity (±10% tolerance), delivery timing. Accept, renegotiate, or reject. Document decision in writing.",type:"action"},{id:"mto-b6",title:"Sell-Through Review",body:"8 wks: move to featured/sale zone. 12 wks: markdown up to 30%. 16 wks: return to maker or archive sale. Discuss with maker before any markdown — keep the relationship.",type:"decision",branches:["Selling → rebuy","Not selling → feedback & review"]}]},{id:"maker",actor:"Maker / Creator",steps:[{id:"mto-m1",title:"Receives Introduction",body:"Reviews outreach. Confirms product is made-to-order and provides lead time, MOQ, and deposit requirement.",type:"action"},{id:"mto-m2",title:"Sends Line Sheet / Portfolio",body:"Shares product images, spec, pricing, lead times, and deposit terms. Made-to-order mechanics confirmed in writing.",type:"action"},{id:"mto-m3",title:"Capacity Confirmed",body:"Maker confirms ability to produce the agreed quantity within the agreed lead time. Any production constraints or shared-capacity risks flagged upfront.",type:"action"},{id:"mto-m4",title:"Receives Deposit & Begins Production",body:"Deposit received triggers production. Maker communicates proactively if timeline shifts. ICP stays in contact at agreed milestones.",note:"Longer lead time (6–10 wks) means this order needs to be placed well ahead of floor refresh dates.",type:"action"},{id:"mto-m5",title:"Dispatches & Story Content",body:"Goods shipped on completion. Maker provides bio, piece story, 3+ process photos, preferred credit name at point of handover.",note:"Ideal for brand/maker to send this through directly. ICP may need to source it — flag early so it doesn't delay the maker card.",type:"action"},{id:"mto-m6",title:"Sales Feedback Received",body:"ICP shares what sold and what didn't. Informs whether to rebuy and at what volume.",type:"action"}]},{id:"admin",actor:"Admin / Ops",steps:[{id:"mto-a1",title:"Log to Maker Pipeline",body:"Tracker updated: maker name, source channel, category, MTO confirmed, lead time, date contacted, follow-up date.",type:"action"},{id:"mto-a2",title:"Acknowledge Inbound",body:"Any unsolicited inbound acknowledged within 5 working days. Standard response with clear next steps and expected timeline.",type:"action"},{id:"mto-a3",title:"Feedback Loop",body:"If not proceeding now: warm, specific response — what would make this a fit? What are we looking for? Keep the door open. This is relationship-building, not rejection.",type:"action"},{id:"mto-a4",title:"Issue PO & Process Payment",body:"PO raised using Open Buying Contract Template (MTO terms noted). Payment processed per agreed terms (full upfront or staged). All payment terms documented in writing before money moves. Any pre-finance cost factored into landed cost margin.",type:"action"},{id:"mto-a5",title:"Stock Intake & Maker Card",body:"Stock received, counted, reconciled against PO. Entered into inventory system. Maker card created and placed in store. Reorder trigger set.",type:"action"},{id:"mto-a6",title:"Reorder Trigger / Archive",body:"System flags reorder. Buyer notified with prior sell-through data to inform next order volume and timing.",type:"action"}]}]},{id:"commission",label:"03 — Commission",sublabel:"Co-designed or made-to-brief · 10–16 week lead time · 20–25% of buying budget",color:"#4a6741",phases:["Discovery","Brief & Outreach","Sampling","Sample Gate","Pre-Finance & Production","Receive & QC"],rows:[{id:"buyer",actor:"Buyer / ICP",steps:[{id:"co-b1",title:"Identify Maker for Commission",body:"Same sourcing channels as open buying, but now looking for a maker whose craft or technique fits a specific brief or gap in the range.",type:"action"},{id:"co-b2",title:"Develop & Share Brief",body:"Define: aesthetic direction, materials, size/quantity, retail price target, timeline. Share clearly and honestly from the first conversation.",note:"Exclusivity / IP is a live question here, not a given — especially with smaller makers who may have existing relationships or prior designs. Raise it early: are you the only stockist in Kigali? In Rwanda? Is this design exclusive to ICP or available elsewhere? Document what's agreed.",guardrail:"Be honest about what you can offer — volume, timeline, price — from the first conversation. Don't negotiate price in a way that makes production unviable for the maker.",type:"action"},{id:"co-b3",title:"ICP Absorbs Sampling Cost",body:"ICP funds the sample. Never ask a maker to absorb the sampling cost for a commission brief.",note:"Sampling budget: 10–15% of total buying budget.",type:"action"},{id:"co-b4",title:"Sample Sign-Off Gate",body:"Does the sample meet the brief? Material, finish, size, quality — all confirmed in writing before production is authorised.",guardrail:"Never commission production without an approved sample on file and written agreement on QC terms and recourse.",type:"decision",branches:["Approved → proceed to production","Revise → resample"]},{id:"co-b5",title:"Commission Agreement Signed",body:"Covers: brief reference, approved sample reference, QC terms, payment schedule, and recourse if delivery doesn't match approved sample.",note:"Exclusivity / IP: document whatever was agreed at brief stage — whether that's full exclusivity, category exclusivity in Kigali, or no exclusivity at all. The important thing is that both sides are clear and it's in writing. Don't assume exclusivity if it wasn't explicitly discussed.",type:"action"},{id:"co-b6",title:"QC Against Approved Sample",body:"Most critical QC step. Reject if: material differs from sample, finish below standard, quantity >10% short, delivery >4 weeks late without agreed extension. Document in writing.",type:"action"}]},{id:"maker",actor:"Maker / Creator",steps:[{id:"co-m1",title:"Identifies / Is Identified",body:"Maker discovered via same channels or responds to open call. Craft or technique fits the brief ICP has in mind.",type:"action"},{id:"co-m2",title:"Reviews Brief & Confirms Capacity",body:"Maker assesses feasibility: can they produce to brief, at the required volume, within the timeline? Wholesale price agreed in principle.",type:"action"},{id:"co-m3",title:"Produces Sample",body:"Maker produces prototype to brief. Physical sample shipped to ICP for review. Feedback given clearly and quickly.",type:"action"},{id:"co-m4",title:"Sample Delivered",body:"Physical sample received by ICP. Buyer reviews against brief and responds with approval or revision notes.",type:"action"},{id:"co-m5",title:"Receives Deposit & Produces",body:"Deposit triggers full production run. Maker communicates proactively if timeline shifts. ICP buyer checks in at agreed milestones.",note:"Access to finance is key to allowing creators to meet orders. Logistics support may be available via sponsorship e.g. Rwandair.",type:"action"},{id:"co-m6",title:"Delivers & Provides Story Content",body:"Goods delivered. Maker provides bio, piece story, 3+ process photos, preferred credit name at point of handover.",note:"Ideal for maker to send this through directly. ICP may need to source — flag early so it doesn't delay the maker card.",type:"action"}]},{id:"admin",actor:"Admin / Ops",steps:[{id:"co-a1",title:"Commission Pipeline Log",body:"Commission briefs tracked separately from open buy pipeline. Log: maker, brief status, sample ETA, finance required, exclusivity/IP position discussed and documented.",type:"action"},{id:"co-a2",title:"Feedback Loop",body:"If not proceeding now: warm, specific response — what would make this a fit? What are we looking for in a commission partner? Keep the door open.",type:"action"},{id:"co-a3",title:"Process Sampling Payment",body:"Sampling cost paid to maker. Logged against the sampling & development budget line (10–15% of total buying budget).",type:"action"},{id:"co-a4",title:"QC Sign-Off Sheet Filed",body:"Sample approval documented on QC Sign-Off Sheet. Signed by buyer. Filed as production reference — this is the benchmark for final delivery.",type:"action"},{id:"co-a5",title:"Finance Tracking & Agreement Filed",body:"Deposit processed and logged. Commission Agreement filed. Finance cost included in landed cost margin calc. Balance payment scheduled against confirmed delivery.",type:"action"},{id:"co-a6",title:"Intake, Maker Card & Balance Payment",body:"Stock received, QC documented in writing, inventory updated. Maker card created. Balance paid. Exit schedule same as open buy: 8 / 12 / 16 week review.",type:"action"}]}]},{id:"consignment",label:"04 — Consignment",sublabel:"High-value or notable pieces placed in store · No upfront buy cost · ICP earns 20% on sale · 4 wk logistics",color:"#3d4f5c",phases:["Identify & Approach","Terms & Agreement","Logistics & Intake","In Store","Sell or Return","Settlement"],rows:[{id:"buyer",actor:"Buyer / ICP",steps:[{id:"cn-b1",title:"Identify for Consignment",body:"Consignment is for high-value pieces, artworks, sculpture, objects by known or significant makers — not everyday stock. Priority is quality over volume. These pieces raise the visual standard for everything else in store.",type:"action"},{id:"cn-b2",title:"Agree Consignment Terms",body:"ICP commission: 20% of agreed retail price on sale. Minimum consignment period: 3 months. Inbound logistics: maker's responsibility. Return logistics + insurance while in store: ICP's responsibility.",note:"This is a consignment arrangement, not a buy. ICP does not own the stock. Payment to maker only occurs on sale.",type:"action"},{id:"cn-b3",title:"Receive & Install",body:"Goods received and logged. Piece placed with full visual merchandising treatment. Maker story card prominent. Hero positioning where appropriate.",type:"action"},{id:"cn-b4",title:"Active Sales Period",body:"Staff briefed on piece and maker story. Maker may be invited for a Maker Moment event. Piece featured in content calendar.",type:"action"},{id:"cn-b5",title:"Sell or Return Decision",body:"12 wks: discuss markdown of up to 30% with maker before actioning. 16 wks (or end of min period): return to maker at ICP's logistics cost.",type:"decision",branches:["Sold → proceed to settlement","Unsold → return or extend by agreement"]},{id:"cn-b6",title:"Settlement",body:"If sold: ICP remits 80% of agreed retail price to maker. If returned: ICP arranges and covers return logistics. Any in-store damage covered by ICP's insurance.",type:"action"}]},{id:"maker",actor:"Maker / Creator",steps:[{id:"cn-m1",title:"Approached or Approaches ICP",body:"ICP identifies maker via scouting, network, or open call. Or maker approaches ICP with a significant piece suitable for consignment.",type:"action"},{id:"cn-m2",title:"Reviews & Accepts Terms",body:"Maker understands they retain ownership until the piece sells. Reviews commission split, minimum period, inbound/return logistics responsibilities, and insurance arrangement.",type:"action"},{id:"cn-m3",title:"Ships Goods to ICP",body:"Inbound logistics at maker's cost and responsibility. Piece packed appropriately for a high-value object. Arrives within agreed window.",note:"4 weeks typically required for logistics + installation. Plan accordingly.",type:"action"},{id:"cn-m4",title:"Piece Live in Store",body:"Maker notified piece is live. Story content gathered (bio, photos, piece narrative) — ideal for maker to send through directly.",note:"ICP may need to source story content — flag early so the maker card is ready before the piece goes on the floor.",type:"action"},{id:"cn-m5",title:"Outcome Communicated",body:"Maker kept informed throughout: ICP communicates if piece is approaching the markdown or return threshold before acting.",type:"action"},{id:"cn-m6",title:"Receives Payment or Piece Back",body:"If sold: receives 80% of agreed retail price. If returned: piece returned in same condition via ICP-arranged logistics. Insurance covers any in-store damage.",type:"action"}]},{id:"admin",actor:"Admin / Ops",steps:[{id:"cn-a1",title:"Consignment Pipeline Log",body:"Log: maker name, piece description, approach date, agreed retail price, commission rate, min period start/end date.",type:"action"},{id:"cn-a2",title:"Consignment Record Created",body:"Consignment Record filed (no purchase order — this is not a buy). Covers: maker details, piece description, agreed retail price, 20% commission rate, min period, insurance policy reference.",type:"action"},{id:"cn-a3",title:"Stock Ledger — Consignment Flag",body:"Piece logged to inventory system as consignment (not owned stock). Insurance confirmed active. Min period end date calendared for review.",type:"action"},{id:"cn-a4",title:"Maker Card in Place",body:"Maker card created and placed with the piece. Confirms story content is live before piece goes on the floor.",type:"action"},{id:"cn-a5",title:"Review Calendar Alert",body:"Alert triggered at 12 weeks (markdown discussion) and 16 weeks / end of min period (return or extend decision). Buyer and maker notified ahead of each threshold.",type:"action"},{id:"cn-a6",title:"Settlement or Return Processed",body:"If sold: maker payment remitted (80% of retail), consignment record closed, inventory updated. If returned: ICP arranges logistics, insurance claim if damage, record closed.",type:"action"}]}]}],p={buyer:{bg:"#1e2d38",text:"#b8d4e8",dot:"#4a7a9b"},maker:{bg:"#2a2018",text:"#d4c4a0",dot:"#b8902a"},admin:{bg:"#1e2a1e",text:"#a8c4a0",dot:"#4a6741"}};function m(e){var t=e.step,n=e.modelColor,a=e.editMode,l=e.onUpdate;if("empty"===t.type)return r.createElement("div",{style:{flex:1,minWidth:0,minHeight:80}});var o="decision"===t.type,s=function(e){return function(n){return l(i(i({},t),{},u({},e,n)))}},c={fontFamily:"'Syne', sans-serif",fontWeight:700,fontSize:11,letterSpacing:"0.02em",lineHeight:1.3,margin:0},f={fontSize:9.5,lineHeight:1.55,color:"rgba(26,20,16,0.58)",margin:0},p={fontSize:8.5,lineHeight:1.5,marginTop:6,background:"rgba(184,144,42,0.08)"
